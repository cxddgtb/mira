name: Auto-Update MiraPlay Subscription

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时 (UTC) → 北京时间 8/14/20/2 点
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Collector
        run: python main.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/index.js.md5 data/latest.json data/archives/
          if git diff --cached --quiet; then
            echo "📭 无变更，跳过提交"
          else
            # 统计接口数量
            COUNT=$(python -c "
            import json, re
            content = open('data/index.js.md5', encoding='utf-8').read()
            match = re.search(r'var config = ({.*?});', content, re.S)
            if match:
                cfg = json.loads(match.group(1))
                sites = len(cfg.get('sites', []))
                lives = len(cfg.get('lives', []))
                print(f'{sites}点播+{lives}直播')
            else:
                print('解析失败'
            )")
            git commit -m "🤖 MiraPlay Auto $(date +'%Y-%m-%d %H:%M') UTC | $COUNT | 中文无损 | Basic Auth 支持"
            git push
          fi
